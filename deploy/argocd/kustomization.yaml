apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: argocd

resources:
  - https://raw.githubusercontent.com/argoproj/argo-cd/stable/manifests/install.yaml

secretGenerator:
  - name: argocd-secret
    behavior: replace
    literals:
      - admin.password=$2a$10$jc58uCO3qGC17IrSo16RSeXEdQb1BGb86vKq.EV0wunuJtSKVxz2i

patches:
  - path: patch.yaml