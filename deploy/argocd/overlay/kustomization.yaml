apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: argocd

resources:
  - ../base

secretGenerator:
  - name: argocd-secret
    behavior: replace
    literals:
      - admin.password=$2a$10$jc58uCO3qGC17IrSo16RSeXEdQb1BGb86vKq.EV0wunuJtSKVxz2i

patches:
  - target:
      kind: Deployment
    patch: |
      - op: add
        path: /spec/template/spec/nodeSelector
        value:
          argocd: "true"

  - target:
      kind: StatefulSet
    patch: |
      - op: add
        path: /spec/template/spec/nodeSelector
        value:
          argocd: "true"